<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARA - Dev Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            💻 NARA - Dev Assistant
        </header>
        
        <div id="chat-box">
            <div class="message message-model">Halo Faisal! Saya Nara, asisten dev kamu. Ada log error, konfigurasi server, atau kode yang mau kita bahas hari ini?</div>
        </div>
        
        <form id="chat-form">
            <input type="text" id="user-input" placeholder="Ketik perintah atau tanyakan sesuatu..." autocomplete="off" required />
            <button type="submit" aria-label="Send">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
